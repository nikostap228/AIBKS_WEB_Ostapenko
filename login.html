<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTB Downhill - Вход</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <img src="mtb.png" alt="MTB Logo" class="logo">
        <h1>Вход 🏔️</h1>
        <p class="subtitle">Войди в свой мир горного велосипеда</p>
        
        <form onsubmit="handleLogin(event)">
            <input type="text" class="input-field" placeholder="Логин" required>
            <input type="password" class="input-field" placeholder="Пароль" required>
            <button type="submit" class="btn-primary">Продолжить </button>
        </form>
        
        <p class="link-text">
            Нет аккаунта? <a href="registration.html">Создать аккаунт</a>
        </p>
    </div>

    <script>
        function handleLogin(e) {
            e.preventDefault();
            window.location.href = 'posts.html';
        }
    </script>
</body>
</html>
