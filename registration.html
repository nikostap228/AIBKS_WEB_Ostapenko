<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTB Downhill - Регистрация</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <img src="mtb.png" alt="MTB Logo" class="logo">
        <h1>Создать аккаунт 🎿</h1>
        <p class="subtitle">Присоединяйся к сообществу райдеров</p>
        
        <form onsubmit="handleRegister(event)">
            <input type="text" class="input-field" placeholder="Логин" required>
            <input type="email" class="input-field" placeholder="Email" required>
            <input type="password" class="input-field" placeholder="Пароль" required>
            <button type="submit" class="btn-primary">Создать аккаунт ✨</button>
        </form>
        
        <p class="link-text">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </p>
    </div>

    <script>
        function handleRegister(e) {
            e.preventDefault();
            window.location.href = 'posts.html';
        }
    </script>
</body>
</html>
